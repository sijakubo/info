baseURL = "https://sijakubo.github.io/info/"

# Change the default theme to be used when building the site with Hugo
theme = "loveIt"

# Website title
title = "Simon Jakubowski"

# Language settings
languageCode = "en"
languageName = "English"

# Menu config
[menu]
  [[menu.main]]
  weight = 1
  identifier = "posts"
  pre = ""   # Extra information before the name (HTML supported)
  post = ""  # Extra information after the name (HTML supported)
  name = "Posts"
  url = "/posts/"
  title = "" # Title shown on hover

[[menu.main]]
  weight = 2
  identifier = "tags"
  pre = ""
  post = ""
  name = "Tags"
  url = "/tags/"
  title = ""

[[menu.main]]
  weight = 3
  identifier = "about"
  pre = ""
  post = ""
  name = "About"
  url = "/about/"
  title = ""

# Markup related configuration in Hugo
[markup]

  # Syntax Highlighting (https://gohugo.io/content-management/syntax-highlighting)
  [markup.highlight]
  noClasses = false  # Required for compatibility (https://github.com/dillonzq/LoveIt/issues/158)

[params]
  title = "Simon Jakubowski"
  description = "About Simon Jakubowski"
  dateFormat = "01.02.2006"
  [params.header]
    [params.header.title]
      name = "Simon Jakubowski"
      typeit = true
  [params.home]
    [params.home.profile]
      enable = false
      typeit = false
      subtitle = ""
    [params.home.posts]
      enable = true
      paginate = 6
  [params.section]
    paginate = 20
  [params.author]
    name = " Simon Jakubowski"
    email = "sijakubo@gmail.com"
    link = ""
  [params.social]
    GitHub = "sijakubo"
    Linkedin = "simon-jakubowski"
  [params.search]
    enable = true
    type = "lunr"
    maxResultLength = 10
    snippetLength = 30
    highlightTag = "em"
  [params.app]
    title = "Simon Jakubowski"

# Output formats
[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML"]
  taxonomy = ["HTML"]

[caches]
  [caches.images]
    dir = ':cacheDir/images'
